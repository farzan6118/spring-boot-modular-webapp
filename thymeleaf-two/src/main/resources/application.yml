server:
  port: 8090

spring:
  application:
    name: Application-DataJPA

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/db_example
    username: user
    password: pass

  jpa:
    hibernate.ddl-auto: update
    open-in-view: false
    show-sql: false
