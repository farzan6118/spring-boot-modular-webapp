<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Update Customer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
            min-height:100vh;
        }

        .page{
            max-width:850px;
            margin:auto;
            padding:60px 15px;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 35px rgba(0,0,0,.08);
        }

        .card-header{
            border:none;
            background:white;
            padding:30px 35px 0;
        }

        .card-body{
            padding:35px;
        }

        .form-label{
            font-weight:600;
        }

        .form-control,
        .form-select{
            border-radius:12px;
            padding:.75rem 1rem;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:0 0 0 .2rem rgba(13,110,253,.15);
        }

        .btn{
            border-radius:12px;
            padding:.8rem;
            font-weight:600;
        }

        .invalid-feedback{
            display:block;
        }

    </style>

</head>

<body>

<div th:replace="menu :: menu-one"></div>

<div class="page">

    <div class="card">

        <div class="card-header">

            <h2 class="fw-bold mb-2">
                <i class="bi bi-pencil-square text-warning"></i>
                Update Customer
            </h2>

            <p class="text-secondary mb-4">
                Modify the customer information and save your changes.
            </p>

        </div>

        <div class="card-body">

            <form
                    method="post"
                    th:action="@{/update/{uuid}(uuid=${customer.uuid})}"
                    th:object="${customer}">

                <div class="row g-4">

                    <div class="col-md-6">

                        <label class="form-label" for="firstname">
                            Firstname
                        </label>

                        <input
                                id="firstname"
                                type="text"
                                class="form-control"
                                th:field="*{firstname}"
                                th:classappend="${#fields.hasErrors('firstname')} ? ' is-invalid'">

                        <div class="invalid-feedback"
                             th:errors="*{firstname}">
                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label" for="lastname">
                            Lastname
                        </label>

                        <input
                                id="lastname"
                                type="text"
                                class="form-control"
                                th:field="*{lastname}"
                                th:classappend="${#fields.hasErrors('lastname')} ? ' is-invalid'">

                        <div class="invalid-feedback"
                             th:errors="*{lastname}">
                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label" for="gender">
                            Gender
                        </label>

                        <select
                                id="gender"
                                class="form-select"
                                th:field="*{gender}"
                                th:classappend="${#fields.hasErrors('gender')} ? ' is-invalid'">

                            <option
                                    th:each="g : ${T(com.project.one.domain.constant.Gender).values()}"
                                    th:value="${g.name()}"
                                    th:text="${g.name()}">
                            </option>

                        </select>

                        <div class="invalid-feedback"
                             th:errors="*{gender}">
                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label" for="birthDate">
                            Birth Date
                        </label>

                        <input
                                id="birthDate"
                                type="date"
                                class="form-control"
                                th:field="*{birthDate}"
                                th:classappend="${#fields.hasErrors('birthDate')} ? ' is-invalid'">

                        <div class="invalid-feedback"
                             th:errors="*{birthDate}">
                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label" for="nationalCode">
                            National Code
                        </label>

                        <input
                                id="nationalCode"
                                type="text"
                                class="form-control"
                                th:field="*{nationalCode}"
                                th:classappend="${#fields.hasErrors('nationalCode')} ? ' is-invalid'">

                        <div class="invalid-feedback"
                             th:errors="*{nationalCode}">
                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label" for="email">
                            Email
                        </label>

                        <input
                                id="email"
                                type="email"
                                class="form-control"
                                th:field="*{email}"
                                th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'">

                        <div class="invalid-feedback"
                             th:errors="*{email}">
                        </div>

                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-5">

                    <a
                            th:href="@{/index}"
                            class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left me-1"></i>
                        Cancel

                    </a>

                    <button
                            type="submit"
                            class="btn btn-warning text-white">

                        <i class="bi bi-check-circle me-1"></i>
                        Update Customer

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
