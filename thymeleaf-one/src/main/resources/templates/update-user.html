<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>

    <title>Update Customer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>
<div th:include="menu :: menu-one"></div>

<div class="container mt-4">
    <h2 class="mb-4">Update Customer</h2>

    <form method="post" th:action="@{/update/{id}(id=${customer.id})}" th:object="${customer}">

        <div class="row mb-3">
            <div class="col">
                <label class="form-label" for="firstName">First Name</label>
                <input class="form-control" id="firstName" placeholder="First Name" th:field="*{firstName}"
                       type="text"/>
                <div class="text-danger small" th:errors="*{firstName}" th:if="${#fields.hasErrors('firstName')}"></div>
            </div>
            <div class="col">
                <label class="form-label" for="lastName">Last Name</label>
                <input class="form-control" id="lastName" placeholder="Last Name" th:field="*{lastName}" type="text"/>
                <div class="text-danger small" th:errors="*{lastName}" th:if="${#fields.hasErrors('lastName')}"></div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label" for="gender">Gender</label>
                <select class="form-select" id="gender" th:field="*{gender}">
                    <option th:each="g : ${T(com.project.one.domain.constant.Gender).values()}"
                            th:text="${g.name()}"
                            th:value="${g.name()}"></option>
                </select>
                <div class="text-danger small" th:errors="*{gender}" th:if="${#fields.hasErrors('gender')}"></div>
            </div>
            <div class="col">
                <label class="form-label" for="birthDate">Birth Date</label>
                <input class="form-control" id="birthDate" th:field="*{birthDate}" type="date"/>
                <div class="text-danger small" th:errors="*{birthDate}" th:if="${#fields.hasErrors('birthDate')}"></div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label" for="nationalCode">National Code</label>
                <input class="form-control" id="nationalCode" placeholder="National Code" th:field="*{nationalCode}"
                       type="text"/>
                <div class="text-danger small" th:errors="*{nationalCode}"
                     th:if="${#fields.hasErrors('nationalCode')}"></div>
            </div>
            <div class="col">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" placeholder="Email" th:field="*{email}" type="email"/>
                <div class="text-danger small" th:errors="*{email}" th:if="${#fields.hasErrors('email')}"></div>
            </div>
        </div>

        <button class="btn btn-success" type="submit">Update</button>
        <a class="btn btn-secondary ms-2" th:href="@{/index}">Cancel</a>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
