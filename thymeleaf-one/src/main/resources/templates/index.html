<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Customers</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            min-height: 100vh;
        }

        .page {
            padding: 60px 15px;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, .08);
        }

        .table > :not(caption) > * > * {
            padding: 1rem;
        }

        tbody tr {
            transition: all .2s ease;
        }

        tbody tr:hover {
            background-color: #f8f9ff;
        }

        .customer-count {
            font-size: .9rem;
            color: #6c757d;
        }

        .action-btn {
            min-width: 85px;
        }

        .table thead th {
            border-bottom: none;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
        }

        .empty-state i {
            font-size: 4rem;
            color: #aebdad;
        }
    </style>
</head>

<body>

<div th:replace="menu :: menu-one"></div>

<div class="container page">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold mb-1">
                <i class="bi bi-people-fill text-primary"></i>
                Customers
            </h2>

            <div class="customer-count">
                Total Customers:
                <span class="fw-semibold" th:text="${users != null ? #lists.size(users) : 0}"></span>
            </div>
        </div>

        <a th:href="@{/signup}" class="btn btn-primary">
            <i class="bi bi-person-plus-fill me-2"></i>
            Add Customer
        </a>

    </div>

    <div class="card">

        <div class="card-body p-0">

            <div th:switch="${users}">

                <div th:case="null" class="empty-state">
                    <i class="bi bi-people"></i>

                    <h4 class="mt-3">No Customers Found</h4>

                    <p class="text-muted">
                        Start by creating your first customer.
                    </p>

                    <a th:href="@{/signup}" class="btn btn-primary">
                        Add Customer
                    </a>
                </div>

                <div th:case="*">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle mb-0">

                            <thead class="table-light">

                            <tr>
                                <th>UUID</th>
                                <th>Firstname</th>
                                <th>Lastname</th>
                                <th>Gender</th>
                                <th>Email</th>
                                <th>Birth Date</th>
                                <th>National Code</th>
                                <th class="text-center">Actions</th>
                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="customer : ${users}">

                                <td class="fw-semibold"
                                    th:text="${customer.uuid}">
                                </td>

                                <td th:text="${customer.firstname}">
                                </td>

                                <td th:text="${customer.lastname}">
                                </td>

                                <td>
                                    <span class="badge rounded-pill text-bg-secondary"
                                          th:text="${customer.gender}">
                                    </span>
                                </td>

                                <td th:text="${customer.email}">
                                </td>

                                <td th:text="${customer.birthDate}">
                                </td>

                                <td th:text="${customer.nationalCode}">
                                </td>

                                <td>

                                    <div class="d-flex justify-content-center gap-2">

                                        <a th:href="@{/edit/{uuid}(uuid=${customer.uuid})}"
                                           class="btn btn-outline-warning btn-sm action-btn">

                                            <i class="bi bi-pencil-square"></i>
                                            Edit

                                        </a>

                                        <a th:href="@{/delete/{uuid}(uuid=${customer.uuid})}"
                                           class="btn btn-outline-danger btn-sm action-btn"
                                           onclick="return confirm('Delete this customer?');">

                                            <i class="bi bi-trash"></i>
                                            Delete

                                        </a>

                                    </div>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
