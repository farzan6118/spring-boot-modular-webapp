<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>

    <title>Add New Customer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        body {
            padding-top: 60px;
        }

        .form-label {
            font-weight: 500;
        }

        .error {
            color: red;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div th:replace="menu :: menu-one"></div>

<div class="container">
    <h2 class="mb-4">Add New Customer</h2>

    <form method="post" th:action="@{/add}" th:object="${customer}">
        <div class="row mb-3">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="firstName">First Name</label>
                <input class="form-control" id="firstName" placeholder="First Name" th:field="*{firstName}"
                       type="text"/>
                <span class="error" th:errors="*{firstName}" th:if="${#fields.hasErrors('firstName')}"></span>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label" for="lastName">Last Name</label>
                <input class="form-control" id="lastName" placeholder="Last Name" th:field="*{lastName}" type="text"/>
                <span class="error" th:errors="*{lastName}" th:if="${#fields.hasErrors('lastName')}"></span>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="gender">Gender</label>
                <select class="form-select" id="gender" th:field="*{gender}">
                    <option disabled selected value="">Select Gender</option>
                    <option th:each="g : ${T(com.project.one.domain.constant.Gender).values()}"
                            th:text="${g.name()}"
                            th:value="${g.name()}"></option>
                </select>
                <span class="error" th:errors="*{gender}" th:if="${#fields.hasErrors('gender')}"></span>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label" for="birthDate">Birth Date</label>
                <input class="form-control" id="birthDate" th:field="*{birthDate}" type="date"/>
                <span class="error" th:errors="*{birthDate}" th:if="${#fields.hasErrors('birthDate')}"></span>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="nationalCode">National Code</label>
                <input class="form-control" id="nationalCode" placeholder="National Code" th:field="*{nationalCode}"
                       type="text"/>
                <span class="error" th:errors="*{nationalCode}" th:if="${#fields.hasErrors('nationalCode')}"></span>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" placeholder="Email" th:field="*{email}" type="email"/>
                <span class="error" th:errors="*{email}" th:if="${#fields.hasErrors('email')}"></span>
            </div>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary btn-lg" type="submit">Save Customer</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
